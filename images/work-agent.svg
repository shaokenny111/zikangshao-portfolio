  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <rect width="1200" height="750" filter="url(#grain)"/>
  <g opacity="0.10" stroke="#1c1b1b" stroke-width="2" fill="none"><circle cx="950" cy="200" r="40"/><circle cx="850" cy="120" r="25"/><circle cx="1020" cy="120" r="25"/><circle cx="800" cy="280" r="25"/><circle cx="1050" cy="280" r="25"/><line x1="850" y1="120" x2="950" y2="200"/><line x1="1020" y1="120" x2="950" y2="200"/><line x1="800" y1="280" x2="950" y2="200"/><line x1="1050" y1="280" x2="950" y2="200"/></g>
  <g font-family="Newsreader, Georgia, serif">
    <text x="80" y="600" font-size="64" font-weight="500" fill="#1c1b1b" letter-spacing="-0.02em">AI Research Agent</text>
    <text x="80" y="660" font-size="32" font-weight="400" font-style="italic" fill="#444748">AI 投研 Agent</text>
  </g>
