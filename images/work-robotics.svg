  <g opacity="0.10" stroke="#1c1b1b" stroke-width="2" fill="none"><rect x="850" y="160" width="100" height="80" rx="8"/><circle cx="875" cy="195" r="6" fill="#1c1b1b"/><circle cx="925" cy="195" r="6" fill="#1c1b1b"/><line x1="900" y1="160" x2="900" y2="130"/><circle cx="900" cy="120" r="10"/><line x1="850" y1="200" x2="820" y2="200"/><line x1="950" y1="200" x2="980" y2="200"/><line x1="870" y1="240" x2="870" y2="280"/><line x1="930" y1="240" x2="930" y2="280"/></g>
